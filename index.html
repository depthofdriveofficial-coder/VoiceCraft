<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groq Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0e17; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
  .header { padding: 16px 20px; background: #1a1a2e; border-bottom: 1px solid #ffffff15; }
  .header h1 { font-size: 20px; background: linear-gradient(90deg,#6c63ff,#ff6584); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
  .user { background: linear-gradient(135deg,#6c63ff,#ff6584); align-self: flex-end; border-bottom-right-radius: 4px; }
  .bot { background: #1a1a2e; border: 1px solid #ffffff15; align-self: flex-start; border-bottom-left-radius: 4px; }
  .input-area { padding: 12px 16px; background: #1a1a2e; border-top: 1px solid #ffffff15; display: flex; gap: 8px; }
  input { flex: 1; background: #0f0e17; border: 1px solid #6c63ff55; border-radius: 24px; padding: 10px 16px; color: white; font-size: 14px; outline: none; }
  button { background: linear-gradient(135deg,#6c63ff,#ff6584); border: none; border-radius: 50%; width: 44px; height: 44px; color: white; font-size: 18px; cursor: pointer; }
  button:disabled { opacity: 0.5; }
</style>
</head>
<body>
<div class="header"><h1>⚡ Groq Chat</h1></div>
<div class="messages" id="msgs">
  <div class="msg bot">Salam! Kuch bhi poocho 👋</div>
</div>
<div class="input-area">
  <input id="inp" placeholder="Yahan likho..." onkeydown="if(event.key==='Enter')send()">
  <button id="btn" onclick="send()">➤</button>
</div>
<script>
let history = [];
function addMsg(role, text) {
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.textContent = text;
  document.getElementById('msgs').appendChild(d);
  d.scrollIntoView();
  return d;
}
async function send() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  document.getElementById('btn').disabled = true;
  addMsg('user', text);
  history.push({ role: 'user', content: text });
  const typing = addMsg('bot', '...');
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();
    typing.textContent = data.reply;
    history.push({ role: 'assistant', content: data.reply });
  } catch(e) {
    typing.textContent = 'Error: ' + e.message;
  }
  document.getElementById('btn').disabled = false;
}
</script>
</body>
</html>
